<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoTrack - History</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { border: var(--border-thick); padding: 1rem; text-align: left; }
        th { background-color: var(--color-primary); text-transform: uppercase; }
        tr:nth-child(even) { background-color: #fafafa; }
        tr:hover { background-color: #f0f0f0; }
        .tag { padding: 0.2rem 0.6rem; border-radius: 4px; font-weight: 600; border: 2px solid var(--border-color); font-size: 0.8rem;}
        .tag.transport { background-color: var(--color-secondary); }
        .tag.food { background-color: var(--color-accent); }
        .tag.energy { background-color: #fff; }
    </style>
</head>
<body>
    <header>
        <div>
            <h1>EcoTrack</h1>
            <p class="subtitle">Understand. Track. Reduce.</p>
        </div>
        <nav class="nav-bar">
            <a href="index.html" class="nav-link">Dashboard</a>
            <a href="history.html" class="nav-link active">History</a>
            <a href="community.html" class="nav-link">Community</a>
            <a href="learn.html" class="nav-link">Learn</a>
        </nav>
        <div></div>
    </header>

    <main>
        <section class="card">
            <h2>Your Activity History</h2>
            <p>Review all your logged actions and their corresponding carbon emissions.</p>
            
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Category</th>
                            <th>Action</th>
                            <th>Value</th>
                            <th>Emissions (kg CO2)</th>
                        </tr>
                    </thead>
                    <tbody id="historyTableBody">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
            
            <div id="emptyMessage" style="text-align: center; margin-top: 2rem; display: none;">
                <p>No activities logged yet! Go to the Dashboard to track your impact.</p>
            </div>
        </section>
    </main>

    <script src="core.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const { loadData, calculateActivityEmission } = window.EcoCore;
            const data = loadData();
            const tbody = document.getElementById('historyTableBody');
            const emptyMessage = document.getElementById('emptyMessage');

            if (data.activities.length === 0) {
                emptyMessage.style.display = 'block';
                return;
            }

            // Sort by newest first
            const sortedActivities = data.activities.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

            sortedActivities.forEach(act => {
                const date = new Date(act.timestamp).toLocaleDateString();
                const emission = calculateActivityEmission(act);
                
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${date}</td>
                    <td><span class="tag ${act.category}">${act.category.toUpperCase()}</span></td>
                    <td style="text-transform: capitalize;">${act.type}</td>
                    <td>${act.category === 'food' ? act.value + ' Meal' : act.value}</td>
                    <td style="font-weight: 700;">+${emission} kg</td>
                `;
                tbody.appendChild(tr);
            });
        });
    </script>
</body>
</html>
