<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoTrack - History</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { border: var(--border-thick); padding: 1rem; text-align: left; }
        th { background-color: var(--color-primary); text-transform: uppercase; }
        tr:nth-child(even) { background-color: #fafafa; }
        tr:hover { background-color: #f0f0f0; }
        .tag { padding: 0.2rem 0.6rem; border-radius: 4px; font-weight: 600; border: 2px solid var(--border-color); font-size: 0.8rem;}
        .tag.transport { background-color: var(--color-secondary); }
        .tag.food { background-color: var(--color-accent); }
        .tag.energy { background-color: #fff; }
    </style>
</head>
<body>
    <header>
        <div>
            <h1>EcoTrack</h1>
            <p class="subtitle">Understand. Track. Reduce.</p>
        </div>
        <nav class="nav-bar">
            <a href="index.html" class="nav-link">Dashboard</a>
            <a href="history.html" class="nav-link active">History</a>
            <a href="community.html" class="nav-link">My Impact</a>
            <a href="learn.html" class="nav-link">Learn</a>
        </nav>
        <div></div>
    </header>

    <main>
        <section class="card">
            <h2>Your Activity History</h2>
            <p>Review all your logged actions and their corresponding carbon emissions.</p>
            
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Category</th>
                            <th>Action</th>
                            <th>Value</th>
                            <th>Emissions (kg CO2)</th>
                        </tr>
                    </thead>
                    <tbody id="historyTableBody">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
            
            <div id="emptyMessage" style="text-align: center; margin-top: 2rem; display: none;">
                <p>No activities logged yet! Go to the Dashboard to track your impact.</p>
            </div>
        </section>
    </main>

    <script src="core.js"></script>
    <script src="history.js"></script>
</body>
</html>
