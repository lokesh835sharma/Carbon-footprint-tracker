server {
    # Cloud Run automatically sets the PORT environment variable, but Nginx inside the container needs to listen on it. 
    # By default, Cloud Run sends traffic to 8080.
    listen 8080;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression for better efficiency
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
